<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌡️ Daikin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; padding: 20px; color: white; }
    .container { max-width: 400px; margin: 0 auto; padding-bottom: 80px; }
    h1 { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
    .subtitle { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: 24px; }
    
    .main-card {
      border-radius: 20px; padding: 24px; margin-bottom: 16px;
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
    }
    
    .main-card.off { background: linear-gradient(135deg, #374151 0%, #1f2937 100%); }
    .main-card.heat { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
    .main-card.dry { background: linear-gradient(135deg, #06b6d4 0%, #0369a1 100%); }
    .main-card.fan { background: linear-gradient(135deg, #6b7280 0%, #374151 100%); }
    .main-card.auto { background: linear-gradient(135deg, #22c55e 0%, #166534 100%); }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .temp-display { font-size: 48px; font-weight: bold; }
    .temp-label { color: rgba(255, 255, 255, 0.8); font-size: 14px; margin-bottom: 8px; }
    
    .power-btn { width: 60px; height: 60px; border: none; border-radius: 50%; font-size: 28px; cursor: pointer; background: rgba(255, 255, 255, 0.2); color: white; transition: all 0.2s; }
    .power-btn:active { transform: scale(0.95); }
    .power-btn.off { background: #ef4444; }
    
    .mode-label { color: rgba(255, 255, 255, 0.8); font-size: 14px; margin-bottom: 12px; }
    
    .temp-controls {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 16px; margin-top: 16px;
    }
    
    .temp-btn { width: 48px; height: 48px; border: none; border-radius: 8px; background: rgba(255, 255, 255, 0.2); color: white; font-size: 24px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .temp-btn:active { transform: scale(0.95); }
    .temp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .presets { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .preset-btn { padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: all 0.2s; }
    .preset-btn:active { transform: scale(0.95); }
    
    .casa { background: #9333ea; }
    .casa:hover { background: #7e22ce; }
    .sleep { background: #4f46e5; }
    .sleep:hover { background: #4338ca; }
    .standby { background: #22c55e; }
    .standby:hover { background: #16a34a; }
    .off-btn { background: #475569; }
    .off-btn:hover { background: #334155; }
    
    .panel { background: #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .panel-label { color: rgba(255, 255, 255, 0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 12px; }
    
    .mode-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .mode-btn { padding: 12px; border: none; border-radius: 8px; background: #334155; color: white; font-size: 20px; cursor: pointer; transition: all 0.2s; }
    .mode-btn:active { transform: scale(0.95); }
    .mode-btn.active { background: white; color: #1e293b; font-weight: bold; }
    
    .fan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .fan-btn { padding: 12px; border: none; border-radius: 8px; background: #334155; color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .fan-btn:active { transform: scale(0.95); }
    .fan-btn.active { background: white; color: #1e293b; }
    
    .swing-btn { width: 100%; padding: 16px; border: none; border-radius: 8px; background: #334155; color: white; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .swing-btn:active { transform: scale(0.98); }
    .swing-btn.active { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); }
    
    .status-message { background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; border-radius: 8px; padding: 12px; color: #86efac; font-size: 13px; margin-bottom: 16px; text-align: center; }
    .status-message.error { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #fca5a5; }
    
    .loading { opacity: 0.5; pointer-events: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌡️ Daikin</h1>
    <p class="subtitle">Controllo climatizzatore</p>

    <div id="statusMessage" class="status-message hidden"></div>

    <div class="main-card cool" id="mainCard">
      <div class="card-header">
        <div>
          <p class="temp-label">Stato</p>
          <p class="temp-display" id="tempDisplay">24°</p>
        </div>
        <button class="power-btn" id="powerBtn" onclick="togglePower()">⏻</button>
      </div>

      <p class="mode-label">Modalità: <span id="modeNameDisplay">Raffreddamento</span></p>
      <div class="temp-controls">
        <button class="temp-btn" onclick="changeTemp(-1)">−</button>
        <span class="temp-display" id="tempValue">24</span>
        <button class="temp-btn" onclick="changeTemp(1)">+</button>
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn casa" onclick="preset('casa')">🏠 Casa</button>
      <button class="preset-btn sleep" onclick="preset('sleep')">😴 Sleep</button>
      <button class="preset-btn standby" onclick="preset('standby')">🔄 Auto</button>
      <button class="preset-btn off-btn" onclick="preset('off')">⏼ Off</button>
    </div>

    <div class="panel">
      <p class="panel-label">Modalità</p>
      <div class="mode-grid">
        <button class="mode-btn active" onclick="setMode('cool')">❄️</button>
        <button class="mode-btn" onclick="setMode('heat')">🔥</button>
        <button class="mode-btn" onclick="setMode('dry')">💧</button>
        <button class="mode-btn" onclick="setMode('fan')">💨</button>
        <button class="mode-btn" onclick="setMode('auto')">🔄</button>
      </div>
    </div>

    <div class="panel">
      <p class="panel-label">💨 Velocità ventola</p>
      <div class="fan-grid">
        <button class="fan-btn active" onclick="setFan('auto')">Auto</button>
        <button class="fan-btn" onclick="setFan('1')">V1</button>
        <button class="fan-btn" onclick="setFan('2')">V2</button>
        <button class="fan-btn" onclick="setFan('3')">V3</button>
        <button class="fan-btn" onclick="setFan('4')">V4</button>
        <button class="fan-btn" onclick="setFan('5')">V5</button>
      </div>
    </div>

    <div class="panel">
      <button class="swing-btn" id="swingBtn" onclick="toggleSwing()">
        <span>💧 Oscillazione</span>
        <span id="swingStatus">✗</span>
      </button>
    </div>
  </div>

  <script>
    const DEVICE_ID = 'bf9a2afef777c5e330aajy';
    
    let state = {
      isOn: true,
      temperature: 24,
      mode: 'cool',
      fanSpeed: 'auto',
      swing: false
    };

    const modes = {
      cool: 'Raffreddamento',
      heat: 'Riscaldamento',
      dry: 'Deumidificazione',
      fan: 'Ventilazione',
      auto: 'Auto'
    };

    async function sendCommand(command, value) {
      try {
        document.getElementById('mainCard').classList.add('loading');
        
        const response = await fetch('/api/tuya-command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ device_id: DEVICE_ID, command, value })
        });

        const data = await response.json();
        
        if (data.success) {
          showStatus('✓ Comando inviato', false);
          return true;
        } else {
          showStatus('✗ Errore: ' + (data.error || 'Sconosciuto'), true);
          return false;
        }
      } catch (error) {
        showStatus('✗ Errore connessione', true);
        return false;
      } finally {
        document.getElementById('mainCard').classList.remove('loading');
      }
    }

    function showStatus(message, isError = false) {
      const div = document.getElementById('statusMessage');
      div.textContent = message;
      div.className = 'status-message' + (isError ? ' error' : '');
      div.classList.remove('hidden');
      setTimeout(() => div.classList.add('hidden'), 3000);
    }

    function updateUI() {
      const modeColors = { cool: 'cool', heat: 'heat', dry: 'dry', fan: 'fan', auto: 'auto' };
      document.getElementById('mainCard').className = 'main-card ' + modeColors[state.mode];
      document.getElementById('tempDisplay').textContent = state.temperature + '°';
      document.getElementById('tempValue').textContent = state.temperature;
      document.getElementById('modeNameDisplay').textContent = modes[state.mode];
      
      document.querySelectorAll('.mode-btn').forEach((btn, i) => {
        const modes_array = ['cool', 'heat', 'dry', 'fan', 'auto'];
        btn.className = 'mode-btn' + (modes_array[i] === state.mode ? ' active' : '');
      });

      document.querySelectorAll('.fan-btn').forEach((btn, i) => {
        const fans = ['auto', '1', '2', '3', '4', '5'];
        btn.className = 'fan-btn' + (fans[i] === state.fanSpeed ? ' active' : '');
      });

      const swingBtn = document.getElementById('swingBtn');
      swingBtn.className = 'swing-btn' + (state.swing ? ' active' : '');
      document.getElementById('swingStatus').textContent = state.swing ? '✓' : '✗';
    }

    async function togglePower() {
      state.isOn = !state.isOn;
      await sendCommand('switch', state.isOn);
      updateUI();
    }

    async function changeTemp(delta) {
      const newTemp = Math.max(16, Math.min(32, state.temperature + delta));
      await sendCommand('temp_set', newTemp);
      state.temperature = newTemp;
      updateUI();
    }

    async function setMode(mode) {
      const tuyaMode = mode === 'fan' ? 'wind' : mode;
      await sendCommand('mode', tuyaMode);
      state.mode = mode;
      updateUI();
    }

    async function setFan(speed) {
      await sendCommand('fan_level', speed);
      state.fanSpeed = speed;
      updateUI();
    }

    async function toggleSwing() {
      state.swing = !state.swing;
      await sendCommand('swing', state.swing);
      updateUI();
    }

    async function preset(name) {
      if (name === 'casa') {
        state = { isOn: true, temperature: 24, mode: 'cool', fanSpeed: '2', swing: false };
      } else if (name === 'sleep') {
        state = { isOn: true, temperature: 26, mode: 'cool', fanSpeed: '1', swing: false };
      } else if (name === 'standby') {
        state = { isOn: true, temperature: 24, mode: 'auto', fanSpeed: 'auto', swing: false };
      } else if (name === 'off') {
        state = { isOn: false, temperature: 24, mode: 'cool', fanSpeed: 'auto', swing: false };
      }
      updateUI();
      
      await sendCommand('switch', state.isOn);
      if (state.isOn) {
        await sendCommand('temp_set', state.temperature);
        await sendCommand('mode', state.mode === 'fan' ? 'wind' : state.mode);
        await sendCommand('fan_level', state.fanSpeed);
      }
    }

    updateUI();
  </script>
</body>
</html>
